name: Generate Wallpaper
on:
  schedule:
    - cron: '5 * * * *' # Run at 5 minutes past the hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout data branch
        uses: actions/checkout@v4
        continue-on-error: true # Will naturally fail on the very first run
        with:
          ref: wallpaper-data
          path: data-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install Pillow requests
          sudo apt-get install -y fonts-liberation

      - name: Run Script
        run: |
          mkdir -p main-repo/raw_images
          # Restore the state (previous images) if the branch exists
          if [ -d "data-repo/raw_images" ]; then
            cp -a data-repo/raw_images/. main-repo/raw_images/
          fi
          cd main-repo
          python build_wallpaper.py
          
      - name: Publish to Data Branch
        run: |
          mkdir deploy
          cp -r main-repo/raw_images deploy/
          cp main-repo/latest_wallpaper.jpg deploy/ || echo "No new wallpaper generated"
          cd deploy
          
          # Initialize a fresh repo to avoid history bloat
          git init
          git checkout -b wallpaper-data
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Hourly Update: $(date -u)"
          
          # Force push to overwrite the target branch
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git wallpaper-data
